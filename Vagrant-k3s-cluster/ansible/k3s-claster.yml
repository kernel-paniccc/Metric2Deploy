---
- name: Master
  hosts: master
  gather_facts: true
  become: true
  vars:
    master_api_host: "{{ hostvars['master'].ansible_host }}"
    k3s_version: "v1.35.5+k3s1"
    local_kube_root: "{{ lookup('env', 'HOME') }}/.kube"
    local_cluster_name: "metric2deploy"
    local_cluster_dir: "{{ local_kube_root }}/{{ local_cluster_name }}"
    local_kubeconfig_path: "{{ local_kube_root }}/{{ local_cluster_name }}.yaml"

  tasks:

    - name: Update system
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install utils
      ansible.builtin.apt:
        name:
          - curl
          - docker.io
        update_cache: true

    - name: Install k3s for master
      ansible.builtin.shell:
        cmd: >-
          curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -s - --write-kubeconfig-mode 644
          --tls-san {{ master_api_host }}
      register: master_k3s_install
      retries: 5
      delay: 15
      until: master_k3s_install.rc == 0
      changed_when: false
    - name: Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: true

    - name: Allow forwarding policy
      ansible.builtin.iptables:
        chain: FORWARD
        policy: ACCEPT

    - name: Allow host network to pod network forwarding
      ansible.builtin.iptables:
        chain: FORWARD
        source: 192.168.56.0/24
        destination: 10.42.0.0/16
        jump: ACCEPT

    - name: Allow host network to service network forwarding
      ansible.builtin.iptables:
        chain: FORWARD
        source: 192.168.56.0/24
        destination: 10.43.0.0/16
        jump: ACCEPT

    - name: Allow pod network to host network forwarding
      ansible.builtin.iptables:
        chain: FORWARD
        source: 10.42.0.0/16
        destination: 192.168.56.0/24
        jump: ACCEPT

    - name: Allow service network to host network forwarding
      ansible.builtin.iptables:
        chain: FORWARD
        source: 10.43.0.0/16
        destination: 192.168.56.0/24
        jump: ACCEPT

    - name: Read k3s node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw
      run_once: true
      no_log: true

    - name: Wait for k3s to be ready
      ansible.builtin.command: /usr/local/bin/k3s kubectl get nodes
      register: nodes_out
      retries: 10
      delay: 5
      until: nodes_out.rc == 0
      changed_when: false

    - name: Ensure local kubeconfig dir exists
      ansible.builtin.file:
        path: "{{ local_cluster_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Read cluster CA certificate
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/tls/server-ca.crt
      register: k3s_ca_raw
      run_once: true
      no_log: true

    - name: Read admin client certificate
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/tls/client-admin.crt
      register: k3s_client_crt_raw
      run_once: true
      no_log: true

    - name: Read admin client key
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/tls/client-admin.key
      register: k3s_client_key_raw
      run_once: true
      no_log: true

    - name: Write CA certificate to host
      ansible.builtin.copy:
        dest: "{{ local_cluster_dir }}/ca.crt"
        mode: "0600"
        content: "{{ k3s_ca_raw.content | b64decode }}"
      delegate_to: localhost
      become: false
      run_once: true
      no_log: true

    - name: Write client certificate to host
      ansible.builtin.copy:
        dest: "{{ local_cluster_dir }}/client.crt"
        mode: "0600"
        content: "{{ k3s_client_crt_raw.content | b64decode }}"
      delegate_to: localhost
      become: false
      run_once: true
      no_log: true

    - name: Write client key to host
      ansible.builtin.copy:
        dest: "{{ local_cluster_dir }}/client.key"
        mode: "0600"
        content: "{{ k3s_client_key_raw.content | b64decode }}"
      delegate_to: localhost
      become: false
      run_once: true
      no_log: true

    - name: Write project kubeconfig to host
      ansible.builtin.copy:
        dest: "{{ local_kubeconfig_path }}"
        mode: "0600"
        content: |
          apiVersion: v1
          clusters:
            - cluster:
                server: https://{{ master_api_host }}:6443
                certificate-authority: {{ local_cluster_dir }}/ca.crt
              name: {{ local_cluster_name }}
          contexts:
            - context:
                cluster: {{ local_cluster_name }}
                user: {{ local_cluster_name }}
                namespace: default
              name: {{ local_cluster_name }}
          current-context: {{ local_cluster_name }}
          kind: Config
          users:
            - name: {{ local_cluster_name }}
              user:
                client-certificate: {{ local_cluster_dir }}/client.crt
                client-key: {{ local_cluster_dir }}/client.key
      delegate_to: localhost
      become: false
      run_once: true

    - name: Remove stale metric2deploy context from default kubeconfig
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - delete-context
          - "{{ local_cluster_name }}"
          - --kubeconfig
          - "{{ local_kube_root }}/config"
      delegate_to: localhost
      become: false
      run_once: true
      failed_when: false
      changed_when: false

    - name: Remove stale metric2deploy user from default kubeconfig
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - delete-user
          - "{{ local_cluster_name }}"
          - --kubeconfig
          - "{{ local_kube_root }}/config"
      delegate_to: localhost
      become: false
      run_once: true
      failed_when: false
      changed_when: false

    - name: Register metric2deploy cluster in default kubeconfig
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - set-cluster
          - "{{ local_cluster_name }}"
          - "--server=https://{{ master_api_host }}:6443"
          - "--certificate-authority={{ local_cluster_dir }}/ca.crt"
          - --embed-certs=false
          - --kubeconfig
          - "{{ local_kube_root }}/config"
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: true

    - name: Register metric2deploy credentials in default kubeconfig
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - set-credentials
          - "{{ local_cluster_name }}"
          - "--client-certificate={{ local_cluster_dir }}/client.crt"
          - "--client-key={{ local_cluster_dir }}/client.key"
          - --embed-certs=false
          - --kubeconfig
          - "{{ local_kube_root }}/config"
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: true

    - name: Register metric2deploy context in default kubeconfig
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - set-context
          - "{{ local_cluster_name }}"
          - "--cluster={{ local_cluster_name }}"
          - "--user={{ local_cluster_name }}"
          - --namespace=default
          - --kubeconfig
          - "{{ local_kube_root }}/config"
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: true

    - name: Switch default kubeconfig to metric2deploy
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - use-context
          - "{{ local_cluster_name }}"
          - --kubeconfig
          - "{{ local_kube_root }}/config"
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: true

    - name: Show kubeconfig paths
      ansible.builtin.debug:
        msg:
          - "Project kubeconfig written to {{ local_kubeconfig_path }}"
          - "Default kubeconfig context {{ local_cluster_name }} registered in {{ local_kube_root }}/config"
      run_once: true

    - name: Warn about controller KUBECONFIG override
      ansible.builtin.debug:
        msg:
          - "Controller KUBECONFIG is set to {{ lookup('env', 'KUBECONFIG') }}"
          - "Unset KUBECONFIG or kubectl/kubectx will ignore {{ local_kube_root }}/config"
      when: lookup('env', 'KUBECONFIG') | length > 0
      run_once: true

    - name: Show nodes
      ansible.builtin.debug:
        msg: "{{ nodes_out.stdout }}"


- name: Worker
  hosts: worker
  gather_facts: true
  become: true
  vars:
    master_api_host: "{{ hostvars['master'].ansible_host }}"
    k3s_version: "v1.35.5+k3s1"

  tasks:

    - name: Update system
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install utils
      ansible.builtin.apt:
        name:
          - curl
          - docker.io
        update_cache: true

    - name: Install k3s for worker
      ansible.builtin.shell:
        cmd: >-
          curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }}
          K3S_URL=https://{{ master_api_host }}:6443
          K3S_TOKEN={{ hostvars['master'].k3s_token_raw.content | b64decode | trim }}
          sh -s - agent
      register: worker_k3s_install
      retries: 5
      delay: 15
      until: worker_k3s_install.rc == 0
      changed_when: false
      no_log: true
