<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Metrics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0b1021',
            card: 'rgba(255, 255, 255, 0.05)',
            accent: '#22d3ee',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-background bg-[radial-gradient(circle_at_top,_rgba(34,211,238,0.16),_transparent_32%),linear-gradient(180deg,_#0b1021_0%,_#111936_100%)] text-slate-100 p-4 md:p-6">
  <main class="mx-auto w-full max-w-6xl">
    <section class="rounded-[28px] border border-white/10 bg-white/5 p-8 shadow-2xl shadow-cyan-950/20 backdrop-blur-md md:p-10">
      <div class="flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
      <div>
          <div class="inline-flex items-center gap-2 rounded-full border border-cyan-400/30 bg-cyan-400/10 px-4 py-2 text-sm font-semibold text-cyan-200">
            <span class="h-2.5 w-2.5 rounded-full bg-cyan-300 shadow-[0_0_0_6px_rgba(34,211,238,0.12)]"></span>
            Metrics Dashboard
          </div>
          <h1 class="mt-4 text-4xl font-semibold tracking-tight md:text-5xl">System Metrics</h1>
          <p class="mt-3 max-w-2xl text-sm leading-relaxed text-slate-400 md:text-base">
            HTML wrapper around the production JSON endpoint <code class="text-slate-200">/metrics/system</code>.
          </p>
          <p class="mt-3 text-sm text-slate-500" id="stamp">Loading metrics...</p>
      </div>
        <div class="flex flex-wrap gap-3">
          <a href="/metrics/system" target="_blank" class="inline-flex items-center rounded-full border border-white/10 bg-white/10 px-5 py-3 text-sm font-semibold text-slate-100 transition hover:border-accent/60 hover:text-accent">
            Open raw JSON
          </a>
          <a href="/" class="inline-flex items-center rounded-full border border-white/10 bg-white/5 px-5 py-3 text-sm font-semibold text-slate-300 transition hover:border-accent/60 hover:text-accent">
            Back to home
          </a>
        </div>
      </div>
      <section class="mt-8 grid gap-4 sm:grid-cols-2 xl:grid-cols-5" id="grid"></section>

      <section class="mt-6 rounded-3xl border border-white/10 bg-slate-950/40 p-5">
        <div class="inline-flex rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs uppercase tracking-[0.18em] text-cyan-200">
          Raw Payload
        </div>
        <pre id="raw" class="mt-4 overflow-auto whitespace-pre-wrap break-words text-sm leading-relaxed text-slate-200">Loading...</pre>
      </section>

      <p class="mt-5 text-sm text-slate-500" id="status"></p>
    </section>
  </main>

  <script>
    const metricSpecs = [
      ["Host", "hostname", "Hostname reported by the running node."],
      ["CPU", "cpu_count", "Online CPU cores visible to the process."],
      ["Uptime", "uptime_seconds", "Seconds since the node booted."],
      ["Idle", "idle_seconds", "Aggregate CPU idle time from /proc/uptime."],
      ["Load 1m", "load_average.1m", "System load average for the last minute."],
      ["Load 5m", "load_average.5m", "System load average for the last 5 minutes."],
      ["Load 15m", "load_average.15m", "System load average for the last 15 minutes."],
      ["Mem Total", "memory.total_kb", "Total memory in kilobytes."],
      ["Mem Free", "memory.available_kb", "Available memory in kilobytes."],
      ["Mem Used", "memory.used_kb", "Used memory estimated as total minus available."]
    ];

    const get = (obj, path) => path.split(".").reduce((acc, key) => acc && acc[key], obj);

    const formatValue = (value) => {
      if (value === null || value === undefined) return "n/a";
      if (typeof value === "number") return Number.isInteger(value) ? String(value) : value.toFixed(2);
      return String(value);
    };

    const renderCard = (label, value, hint) => `
      <article class="rounded-3xl border border-white/10 bg-card p-5 shadow-lg shadow-cyan-950/10 transition hover:-translate-y-0.5 hover:border-accent/50 hover:shadow-cyan-500/10">
        <div class="inline-flex rounded-full border border-white/10 bg-white/5 px-3 py-1 text-[11px] uppercase tracking-[0.18em] text-cyan-200">${label}</div>
        <div class="mt-4 text-3xl font-semibold leading-tight text-slate-50">${formatValue(value)}</div>
        <div class="mt-3 text-sm leading-relaxed text-slate-400">${hint}</div>
      </article>
    `;

    async function loadMetrics() {
      try {
        const response = await fetch("/metrics/system");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        document.getElementById("stamp").textContent = `Collected at ${data.collected_at ?? "unknown"}`;
        document.getElementById("grid").innerHTML = metricSpecs
          .map(([label, path, hint]) => renderCard(label, get(data, path), hint))
          .join("");
        document.getElementById("raw").textContent = JSON.stringify(data, null, 2);
        document.getElementById("status").textContent = "Metrics loaded from /metrics/system";
      } catch (error) {
        document.getElementById("stamp").textContent = "Failed to load metrics";
        document.getElementById("raw").textContent = String(error);
        document.getElementById("status").textContent = "The HTML wrapper could not fetch /metrics/system";
      }
    }

    loadMetrics();
  </script>
</body>
</html>
