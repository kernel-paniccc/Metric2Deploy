name: Update Deployment Image

on:
  workflow_call:
    inputs:
      repository_owner:
        required: true
        type: string
      version_tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-manifest:
    name: Patch Kubernetes Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch deployment image
        env:
          REPO_OWNER: ${{ inputs.repository_owner }}
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          sed -i "s|image: .*|image: ghcr.io/${REPO_OWNER}/metric2deploy:${VERSION_TAG}|" k3s-manifest/deployment.yaml

      - name: Commit updated manifest
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k3s-manifest/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(cd): deploy ${VERSION_TAG}"
          git push origin HEAD:main
