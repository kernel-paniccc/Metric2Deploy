name: Publish Image

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "k3s-manifest/deployment.yaml"

permissions:
  contents: write
  packages: write

jobs:
  security:
    name: Security Checks
    uses: ./.github/workflows/security-ci.yml

  go-ci:
    name: Go Checks
    uses: ./.github/workflows/go-ci.yml

  publish:
    name: Build And Push
    runs-on: ubuntu-latest
    needs:
      - security
      - go-ci
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute release tag
        id: version
        run: printf 'version_tag=0.0.%s\n' "$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/metric2deploy
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version_tag }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-deployment:
    name: Update Deployment Manifest
    needs:
      - publish
    uses: ./.github/workflows/update-deployment-image.yml
    with:
      repository_owner: ${{ github.repository_owner }}
      version_tag: ${{ needs.publish.outputs.version_tag }}
